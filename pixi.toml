[workspace]
name = "scaudit"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = ">=3.11,<3.13"
pip = "*"
typer = "*"
rich = "*"
scanpy = "*"
anndata = "*"
scikit-learn = "*"
quarto = "*"
matplotlib = "*"
seaborn = "*"
pandas = "*"
jupyter = "*"
nbformat = "*"
ipykernel = "*"

[feature.provider-r.dependencies]
r-base = ">=4.3,<4.5"
"r-data.table" = "*"
r-dplyr = "*"
r-jsonlite = "*"
r-readr = "*"

[pypi-dependencies]
scaudit = { path = ".", editable = true }
great-tables = "*"

[environments]
default = { solve-group = "default" }
provider-r = { features = ["provider-r"], solve-group = "provider-r" }

[tasks]
scaudit = "scaudit"
doctor = "scaudit doctor"
test = "python -m unittest discover -s tests"
