[workspace]
name = "scaudit"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = ">=3.11,<3.13"
pip = "*"
typer = "*"
rich = "*"
scanpy = "*"
anndata = "*"
scikit-learn = "*"
quarto = "*"
matplotlib = "*"
seaborn = "*"
pandas = "*"
jupyter = "*"
nbformat = "*"
ipykernel = "*"

[pypi-dependencies]
scaudit = { path = ".", editable = true }
great-tables = "*"

[tasks]
scaudit = "scaudit"
doctor = "scaudit doctor"
test = "python -m unittest discover -s tests"
